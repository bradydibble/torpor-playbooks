---
# Gather Facts — ephemeral hosts variant.
#
# Same behaviour as ctrliq/ascender-playbooks `gather_facts.yml` but tolerates
# unreachable hosts. Intended for torpor-managed test VMs and game servers —
# fleets that are expected to be off most of the time, where `unreachable`
# is the steady state, not an error. Hosts that ARE up still contribute
# their package and service facts.
- name: Gather System Facts (ephemeral-tolerant)
  hosts: all
  ignore_unreachable: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto
      when: ansible_os_family != 'Windows'

    - name: Gather service facts
      ansible.builtin.service_facts:
      when: ansible_os_family != 'Windows'

    - name: Gather Windows Disk Facts
      community.windows.win_disk_facts:
      when: ansible_os_family == 'Windows'

    - name: Shut down host (ephemeral — off is steady state)
      ansible.builtin.command: shutdown -h +1
      become: true
      ignore_errors: true
      when:
        - ansible_os_family != 'Windows'
        - group_names | intersect(['linux_test_vms', 'game_servers']) | length > 0
